<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="container">
    <h1>Create Blog Post</h1>
    <p th:text="'Platform: ' + ${platformName}">Platform</p>
    <p th:text="'Maximum image upload size: ' + ${maxImageUploadSize}">Max size</p>

    <form th:action="@{/posts}" th:object="${createBlogPostRequest}" method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label for="title">Title</label>
            <input id="title" type="text" th:field="*{title}">
            <div class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
        </div>

        <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" rows="8" th:field="*{content}"></textarea>
            <div class="field-error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
        </div>

        <div class="form-group">
            <label for="coverImage">Cover image</label>
            <input id="coverImage" type="file" th:field="*{coverImage}" accept="image/*">
        </div>

        <button class="button" type="submit">Publish</button>
        <a class="button button-secondary" th:href="@{/}">Cancel</a>
    </form>
</main>
</body>
</html>
